{% extends 'tracker/base.html' %}

{% block content %}
<div style="max-width:420px; margin: 60px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:30px;">
            <h1 style="font-size:2rem; color:var(--primary);">Join SmartHire</h1>
            <p style="color:var(--muted); margin-top:8px;">Free forever. No credit card needed.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color:var(--danger); font-size:0.82rem; margin-top:4px;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-size:1rem;">
                Create Account 🚀
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; color:var(--muted);">
            Already have an account? <a href="/login/" style="color:var(--primary);">Login</a>
        </p>
    </div>
</div>
{% endblock %}
