{% extends 'tracker/base.html' %}

{% block content %}
<div style="max-width:420px; margin: 60px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:30px;">
            <h1 style="font-size:2rem; color:var(--primary);">Welcome Back</h1>
            <p style="color:var(--muted); margin-top:8px;">Track your job applications smartly</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-size:1rem;">
                Login →
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; color:var(--muted);">
            Don't have an account? <a href="/register/" style="color:var(--primary);">Sign Up Free</a>
        </p>
    </div>
</div>
{% endblock %}
